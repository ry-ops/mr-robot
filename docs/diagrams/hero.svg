<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="t d">
  <title id="t">Mr. Robot — two-layer architecture</title>
  <desc id="d">The orchestrator (layer 2) spawns Hat robots that work the arcade and memory (layer 1). Findings flow up; tasks flow down. The control loop drives reinforce/repurpose decisions on a heartbeat.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070710"/>
      <stop offset="50%" stop-color="#0e0f1c"/>
      <stop offset="100%" stop-color="#05050a"/>
    </linearGradient>
    <linearGradient id="panelTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e22" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a0612" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="panelBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1018" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06121a" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="brain" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff345a" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ff2040" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff2040" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1.2" fill="#39ff14" fill-opacity="0.02"/>
    </pattern>
    <path id="down1" d="M 700 150 C 350 250 280 350 280 520"/>
    <path id="down2" d="M 700 150 C 480 230 460 350 460 520"/>
    <path id="down3" d="M 700 150 C 700 230 700 350 700 520"/>
    <path id="down4" d="M 700 150 C 920 230 940 350 940 520"/>
    <path id="down5" d="M 700 150 C 1050 250 1120 350 1120 520"/>
    <path id="up1" d="M 280 520 C 280 350 480 230 700 150"/>
    <path id="up3" d="M 700 520 C 700 350 700 230 700 150"/>
    <path id="up5" d="M 1120 520 C 1120 350 920 230 700 150"/>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect width="1400" height="700" fill="url(#scanlines)"/>

  <!-- TITLE BAR -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'Courier New', monospace">
    <text x="700" y="50" text-anchor="middle" font-size="36" font-weight="700" fill="#ff2a45" letter-spacing="8" filter="url(#softglow)">
      MR. ROBOT
      <animate attributeName="fill-opacity" values="1;0.85;1;0.6;1;1;1" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="700" y="78" text-anchor="middle" font-size="13" fill="#7fff8f" letter-spacing="3" opacity="0.75">
      an ADR-driven HackTheBox co-pilot
    </text>
    <line x1="100" y1="92" x2="1300" y2="92" stroke="#39ff14" stroke-width="0.5" opacity="0.35"/>
  </g>

  <!-- LAYER 2: ORCHESTRATOR PANEL -->
  <g>
    <rect x="40" y="110" width="1320" height="180" rx="8" fill="url(#panelTop)" stroke="#ff2a45" stroke-width="1" stroke-opacity="0.35"/>
    <text x="65" y="135" font-family="ui-monospace, monospace" font-size="11" fill="#ff7090" letter-spacing="3">LAYER 2 — THE ORCHESTRATOR</text>

    <!-- pulsing brain / Mr. Robot mask suggestion -->
    <g transform="translate(700 200)">
      <circle r="80" fill="url(#brain)">
        <animate attributeName="r" values="76;90;76" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.85;1;0.85" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle r="48" fill="none" stroke="#ff2a45" stroke-width="1.2" opacity="0.8" filter="url(#glow)"/>
      <circle r="36" fill="#0a0a14" stroke="#ff2a45" stroke-width="0.8" opacity="0.95"/>
      <!-- mask hint: two eyes + mouth slits -->
      <ellipse cx="-11" cy="-4" rx="6" ry="3" fill="#ff2a45" opacity="0.85"/>
      <ellipse cx="11" cy="-4" rx="6" ry="3" fill="#ff2a45" opacity="0.85"/>
      <rect x="-13" y="9" width="26" height="2.5" rx="1" fill="#ff2a45" opacity="0.85"/>
      <text y="68" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ff7090" letter-spacing="2">heartbeat ♥</text>
    </g>

    <!-- decision badges flanking the brain -->
    <g font-family="ui-monospace, monospace" font-size="10" fill="#39ff14">
      <g transform="translate(360 195)">
        <rect x="-58" y="-14" width="116" height="28" rx="14" fill="#0a0a14" stroke="#39ff14" stroke-width="0.8" opacity="0.9"/>
        <text text-anchor="middle" y="4">ASSESS</text>
      </g>
      <g transform="translate(520 195)">
        <rect x="-66" y="-14" width="132" height="28" rx="14" fill="#0a0a14" stroke="#39ff14" stroke-width="0.8" opacity="0.9"/>
        <text text-anchor="middle" y="4">REINFORCE</text>
      </g>
      <g transform="translate(880 195)">
        <rect x="-66" y="-14" width="132" height="28" rx="14" fill="#0a0a14" stroke="#39ff14" stroke-width="0.8" opacity="0.9"/>
        <text text-anchor="middle" y="4">REPURPOSE</text>
      </g>
      <g transform="translate(1040 195)">
        <rect x="-58" y="-14" width="116" height="28" rx="14" fill="#0a0a14" stroke="#39ff14" stroke-width="0.8" opacity="0.9"/>
        <text text-anchor="middle" y="4">ASSIGN</text>
      </g>
    </g>
  </g>

  <!-- LAYER 1: ARSENAL PANEL -->
  <g>
    <rect x="40" y="510" width="1320" height="170" rx="8" fill="url(#panelBot)" stroke="#39ff14" stroke-width="1" stroke-opacity="0.4"/>
    <text x="65" y="535" font-family="ui-monospace, monospace" font-size="11" fill="#7fff8f" letter-spacing="3">LAYER 1 — THE ARSENAL</text>

    <!-- THE ARCADE component (left) -->
    <g transform="translate(280 595)">
      <rect x="-150" y="-45" width="300" height="90" rx="6" fill="#0a0a14" stroke="#39ff14" stroke-width="1.2" opacity="0.92" filter="url(#glow)"/>
      <text text-anchor="middle" y="-22" font-family="ui-monospace, monospace" font-size="13" fill="#7fff8f" font-weight="700" letter-spacing="2">THE ARCADE</text>
      <text text-anchor="middle" y="-5" font-family="ui-monospace, monospace" font-size="9" fill="#a0b8a8" letter-spacing="1">findings · tasks · robots · scope</text>
      <!-- 5x2 hex-grid hint of findings -->
      <g fill="#39ff14" opacity="0.85">
        <circle cx="-90" cy="22" r="4"><animate attributeName="r" values="3;5;3" dur="2.2s" begin="0s" repeatCount="indefinite"/></circle>
        <circle cx="-54" cy="22" r="4"><animate attributeName="r" values="3;5;3" dur="2.2s" begin="0.3s" repeatCount="indefinite"/></circle>
        <circle cx="-18" cy="22" r="4"><animate attributeName="r" values="3;5;3" dur="2.2s" begin="0.6s" repeatCount="indefinite"/></circle>
        <circle cx="18"  cy="22" r="4"><animate attributeName="r" values="3;5;3" dur="2.2s" begin="0.9s" repeatCount="indefinite"/></circle>
        <circle cx="54"  cy="22" r="4"><animate attributeName="r" values="3;5;3" dur="2.2s" begin="1.2s" repeatCount="indefinite"/></circle>
        <circle cx="90"  cy="22" r="4"><animate attributeName="r" values="3;5;3" dur="2.2s" begin="1.5s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- THE PLAYBOOK component (middle) -->
    <g transform="translate(700 595)">
      <rect x="-130" y="-45" width="260" height="90" rx="6" fill="#0a0a14" stroke="#f8d35a" stroke-width="1.2" opacity="0.92" filter="url(#glow)"/>
      <text text-anchor="middle" y="-22" font-family="ui-monospace, monospace" font-size="13" fill="#f8d35a" font-weight="700" letter-spacing="2">THE PLAYBOOK</text>
      <text text-anchor="middle" y="-5" font-family="ui-monospace, monospace" font-size="9" fill="#d4c08a" letter-spacing="1">findings → tasks (unlock rules)</text>
      <!-- task lines -->
      <g stroke="#f8d35a" stroke-width="0.8" opacity="0.7">
        <line x1="-100" y1="16" x2="100" y2="16">
          <animate attributeName="stroke-dasharray" values="0 200; 200 0; 0 200" dur="3s" repeatCount="indefinite"/>
        </line>
        <line x1="-100" y1="26" x2="100" y2="26">
          <animate attributeName="stroke-dasharray" values="200 0; 0 200; 200 0" dur="3s" repeatCount="indefinite"/>
        </line>
        <line x1="-100" y1="36" x2="100" y2="36">
          <animate attributeName="stroke-dasharray" values="0 200; 200 0; 0 200" dur="3.5s" repeatCount="indefinite"/>
        </line>
      </g>
    </g>

    <!-- THE MEMORY component (right) -->
    <g transform="translate(1120 595)">
      <rect x="-150" y="-45" width="300" height="90" rx="6" fill="#0a0a14" stroke="#9966ff" stroke-width="1.2" opacity="0.92" filter="url(#glow)"/>
      <text text-anchor="middle" y="-22" font-family="ui-monospace, monospace" font-size="13" fill="#bba0ff" font-weight="700" letter-spacing="2">THE MEMORY</text>
      <text text-anchor="middle" y="-5" font-family="ui-monospace, monospace" font-size="9" fill="#a098c8" letter-spacing="1">aiana · Qdrant · Redis</text>
      <!-- three backend bars -->
      <g>
        <rect x="-100" y="14" width="60" height="14" rx="3" fill="#3a3a5a" stroke="#9966ff" stroke-width="0.6"/>
        <text x="-70" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#bba0ff">FTS5</text>
        <rect x="-30" y="14" width="60" height="14" rx="3" fill="#3a3a5a" stroke="#9966ff" stroke-width="0.6"/>
        <text x="0" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#bba0ff">Qdrant</text>
        <rect x="40" y="14" width="60" height="14" rx="3" fill="#3a3a5a" stroke="#9966ff" stroke-width="0.6"/>
        <text x="70" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#bba0ff">Redis</text>
        <circle cx="-70" cy="21" r="2" fill="#9966ff">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="21" r="2" fill="#9966ff">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="70" cy="21" r="2" fill="#9966ff">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </g>

  <!-- CONNECTING FLOWS (between layers) -->
  <g stroke-width="1" fill="none" opacity="0.35">
    <use href="#down1" stroke="#39ff14"/>
    <use href="#down2" stroke="#39ff14"/>
    <use href="#down3" stroke="#39ff14"/>
    <use href="#down4" stroke="#39ff14"/>
    <use href="#down5" stroke="#39ff14"/>
  </g>

  <!-- HAT ROBOTS — drift between layers, colored circles -->
  <g font-family="ui-monospace, monospace" font-size="9" font-weight="700">
    <g>
      <circle r="18" fill="#ffffff" stroke="#0a0a14" stroke-width="1.5" filter="url(#glow)"/>
      <text text-anchor="middle" y="3" fill="#0a0a14">WHITE</text>
      <animateMotion dur="9s" repeatCount="indefinite" rotate="0">
        <mpath href="#down1"/>
      </animateMotion>
    </g>
    <g>
      <circle r="18" fill="#2a2a32" stroke="#ff2a45" stroke-width="1.5" filter="url(#glow)"/>
      <text text-anchor="middle" y="3" fill="#ff2a45">BLACK</text>
      <animateMotion dur="9s" repeatCount="indefinite" begin="-2s" rotate="0">
        <mpath href="#down2"/>
      </animateMotion>
    </g>
    <g>
      <circle r="18" fill="#3399ff" stroke="#0a0a14" stroke-width="1.5" filter="url(#glow)"/>
      <text text-anchor="middle" y="3" fill="#0a0a14">BLUE</text>
      <animateMotion dur="9s" repeatCount="indefinite" begin="-4s" rotate="0">
        <mpath href="#down3"/>
      </animateMotion>
    </g>
    <g>
      <circle r="18" fill="#9966ff" stroke="#0a0a14" stroke-width="1.5" filter="url(#glow)"/>
      <text text-anchor="middle" y="3" fill="#0a0a14">PURPLE</text>
      <animateMotion dur="9s" repeatCount="indefinite" begin="-6s" rotate="0">
        <mpath href="#down4"/>
      </animateMotion>
    </g>
    <g>
      <circle r="18" fill="#cc0033" stroke="#0a0a14" stroke-width="1.5" filter="url(#glow)"/>
      <text text-anchor="middle" y="3" fill="#0a0a14">RED·T</text>
      <animateMotion dur="9s" repeatCount="indefinite" begin="-8s" rotate="0">
        <mpath href="#down5"/>
      </animateMotion>
    </g>
  </g>

  <!-- FINDING PARTICLES — small green dots flowing upward -->
  <g fill="#39ff14" filter="url(#glow)">
    <circle r="3.5">
      <animateMotion dur="3.5s" repeatCount="indefinite" begin="0s">
        <mpath href="#up1"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5">
      <animateMotion dur="3.5s" repeatCount="indefinite" begin="-1.2s">
        <mpath href="#up3"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" begin="-1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5">
      <animateMotion dur="3.5s" repeatCount="indefinite" begin="-2.4s">
        <mpath href="#up5"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" begin="-2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- side labels -->
  <g font-family="ui-monospace, monospace" font-size="10" fill="#7fff8f" letter-spacing="2" opacity="0.7">
    <text x="60" y="400" transform="rotate(-90 60 400)">tasks ▼</text>
    <text x="1340" y="400" transform="rotate(90 1340 400)" text-anchor="end">findings ▲</text>
  </g>

  <!-- footer ticker -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#5a6280" opacity="0.7">
    <text x="700" y="695" text-anchor="middle" letter-spacing="2">
      hello, friend.
    </text>
  </g>
</svg>
