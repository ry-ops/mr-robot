<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="t d">
  <title id="t">Mr. Robot — the Hat constellation</title>
  <desc id="d">Eleven Hats orbit the Mr. Robot core. Five are Accepted — their contract reduces to operate within scope using the wired toolset. Six are Proposed — they need runtime behavior not yet built.</desc>

  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070710"/>
      <stop offset="100%" stop-color="#05050a"/>
    </linearGradient>
    <radialGradient id="core4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2a45" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff2040" stop-opacity="0"/>
    </radialGradient>
    <filter id="g4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g4soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan4" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1.2" fill="#39ff14" fill-opacity="0.02"/>
    </pattern>
  </defs>

  <rect width="1400" height="800" fill="url(#bg4)"/>
  <rect width="1400" height="800" fill="url(#scan4)"/>

  <!-- title -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="700" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#ff2a45" letter-spacing="6" filter="url(#g4soft)">THE HAT CONSTELLATION</text>
    <text x="700" y="76" text-anchor="middle" font-size="11" fill="#7fff8f" letter-spacing="3" opacity="0.7">eleven personas · five accepted · six proposed</text>
  </g>

  <!-- ring guide -->
  <circle cx="700" cy="430" r="270" fill="none" stroke="#39ff14" stroke-width="0.6" stroke-dasharray="2 6" opacity="0.25"/>

  <!-- spokes from center to each hat, animated -->
  <g stroke-width="0.8" opacity="0.3">
    <line x1="700" y1="430" x2="700" y2="160" stroke="#ffffff"/>
    <line x1="700" y1="430" x2="927" y2="318" stroke="#ff2a45"/>
    <line x1="700" y1="430" x2="952" y2="468" stroke="#4488ff"/>
    <line x1="700" y1="430" x2="881" y2="606" stroke="#aa55ff"/>
    <line x1="700" y1="430" x2="685" y2="700" stroke="#cc0033"/>
    <line x1="700" y1="430" x2="519" y2="666" stroke="#0066cc"/>
    <line x1="700" y1="430" x2="458" y2="555" stroke="#7733cc"/>
    <line x1="700" y1="430" x2="430" y2="404" stroke="#ffaa22"/>
    <line x1="700" y1="430" x2="464" y2="276" stroke="#33cc55"/>
    <line x1="700" y1="430" x2="608" y2="172" stroke="#ff3344"/>
    <line x1="700" y1="430" x2="876" y2="180" stroke="#888a96"/>
  </g>

  <!-- CORE — Mr. Robot mask -->
  <g transform="translate(700 430)">
    <circle r="70" fill="url(#core4)">
      <animate attributeName="r" values="64;82;64" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="46" fill="#0a0a14" stroke="#ff2a45" stroke-width="1.4" filter="url(#g4)"/>
    <!-- stylized mask -->
    <ellipse cx="-14" cy="-6" rx="8" ry="4" fill="#ff2a45"/>
    <ellipse cx="14" cy="-6" rx="8" ry="4" fill="#ff2a45"/>
    <rect x="-17" y="10" width="34" height="3" rx="1.5" fill="#ff2a45"/>
    <text y="74" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#ff7090" letter-spacing="3">CORE</text>
  </g>

  <!-- HATS: 11 of them, around the ring. Order chosen to put Accepted in the upper arc. -->
  <!-- i=0 (top): White Hat — Accepted -->
  <g transform="translate(700 160)" font-family="ui-monospace, monospace">
    <circle r="32" fill="#ffffff" stroke="#39ff14" stroke-width="2" filter="url(#g4)">
      <animate attributeName="r" values="30;34;30" dur="3.2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <text text-anchor="middle" y="3" font-size="10" fill="#0a0a14" font-weight="700">WHITE</text>
    <text text-anchor="middle" y="-48" font-size="11" fill="#7fff8f" letter-spacing="1">White Hat</text>
    <text text-anchor="middle" y="-32" font-size="9" fill="#5a6280">ADR-0001 · ✓ Accepted</text>
  </g>
  <!-- i=1 (upper-right): Black Hat — Accepted -->
  <g transform="translate(927 318)" font-family="ui-monospace, monospace">
    <circle r="32" fill="#2a2a32" stroke="#39ff14" stroke-width="2" filter="url(#g4)">
      <animate attributeName="r" values="30;34;30" dur="3.2s" begin="-0.3s" repeatCount="indefinite"/>
    </circle>
    <text text-anchor="middle" y="3" font-size="10" fill="#ff7090" font-weight="700">BLACK</text>
    <text x="44" y="-2" font-size="11" fill="#7fff8f" letter-spacing="1" text-anchor="start">Black Hat</text>
    <text x="44" y="14" font-size="9" fill="#5a6280" text-anchor="start">ADR-0002 · ✓ Accepted</text>
  </g>
  <!-- i=2 (right-ish): Blue Hat — Accepted -->
  <g transform="translate(952 468)" font-family="ui-monospace, monospace">
    <circle r="32" fill="#4488ff" stroke="#39ff14" stroke-width="2" filter="url(#g4)">
      <animate attributeName="r" values="30;34;30" dur="3.2s" begin="-0.6s" repeatCount="indefinite"/>
    </circle>
    <text text-anchor="middle" y="3" font-size="10" fill="#0a0a14" font-weight="700">BLUE</text>
    <text x="44" y="-2" font-size="11" fill="#7fff8f" letter-spacing="1">Blue Hat</text>
    <text x="44" y="14" font-size="9" fill="#5a6280">ADR-0005 · ✓ Accepted</text>
  </g>
  <!-- i=3 (lower-right): Purple Hat — Accepted -->
  <g transform="translate(881 606)" font-family="ui-monospace, monospace">
    <circle r="32" fill="#aa55ff" stroke="#39ff14" stroke-width="2" filter="url(#g4)">
      <animate attributeName="r" values="30;34;30" dur="3.2s" begin="-0.9s" repeatCount="indefinite"/>
    </circle>
    <text text-anchor="middle" y="3" font-size="9" fill="#0a0a14" font-weight="700">PURPLE</text>
    <text x="44" y="-2" font-size="11" fill="#7fff8f" letter-spacing="1">Purple Hat</text>
    <text x="44" y="14" font-size="9" fill="#5a6280">ADR-0007 · ✓ Accepted</text>
  </g>
  <!-- i=4 (bottom-right): Red Team — Accepted, TEAM -->
  <g transform="translate(685 700)" font-family="ui-monospace, monospace">
    <circle r="36" fill="#cc0033" stroke="#39ff14" stroke-width="2.4" filter="url(#g4)">
      <animate attributeName="r" values="34;38;34" dur="3.2s" begin="-1.2s" repeatCount="indefinite"/>
    </circle>
    <text text-anchor="middle" y="-2" font-size="9" fill="#ffffff" font-weight="700">RED</text>
    <text text-anchor="middle" y="10" font-size="9" fill="#ffffff" font-weight="700">TEAM</text>
    <text text-anchor="middle" y="58" font-size="11" fill="#7fff8f" letter-spacing="1">Red Team</text>
    <text text-anchor="middle" y="72" font-size="9" fill="#5a6280">ADR-0009 · ✓ Accepted</text>
  </g>
  <!-- i=5 (bottom-left): Blue Team — Proposed, TEAM -->
  <g transform="translate(519 666)" font-family="ui-monospace, monospace">
    <circle r="36" fill="none" stroke="#0066cc" stroke-width="2" stroke-dasharray="6 3" opacity="0.85">
      <animate attributeName="stroke-dashoffset" values="0;-9" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="32" fill="#0066cc" fill-opacity="0.18"/>
    <text text-anchor="middle" y="-2" font-size="9" fill="#aaccff" font-weight="700">BLUE</text>
    <text text-anchor="middle" y="10" font-size="9" fill="#aaccff" font-weight="700">TEAM</text>
    <text text-anchor="middle" y="58" font-size="11" fill="#a0b8c8" letter-spacing="1">Blue Team</text>
    <text text-anchor="middle" y="72" font-size="9" fill="#5a6280">ADR-0010 · ⏳ Proposed</text>
  </g>
  <!-- i=6 (left-lower): Purple Team — Proposed, TEAM -->
  <g transform="translate(458 555)" font-family="ui-monospace, monospace">
    <circle r="36" fill="none" stroke="#7733cc" stroke-width="2" stroke-dasharray="6 3" opacity="0.85">
      <animate attributeName="stroke-dashoffset" values="0;-9" dur="1.4s" begin="-0.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="32" fill="#7733cc" fill-opacity="0.18"/>
    <text text-anchor="middle" y="-2" font-size="8" fill="#ccaaff" font-weight="700">PURPLE</text>
    <text text-anchor="middle" y="10" font-size="9" fill="#ccaaff" font-weight="700">TEAM</text>
    <text x="-46" y="-2" font-size="11" fill="#a0b8c8" letter-spacing="1" text-anchor="end">Purple Team</text>
    <text x="-46" y="14" font-size="9" fill="#5a6280" text-anchor="end">ADR-0011 · ⏳ Proposed</text>
  </g>
  <!-- i=7 (left): Script Kiddie — Proposed -->
  <g transform="translate(430 404)" font-family="ui-monospace, monospace">
    <circle r="32" fill="none" stroke="#ffaa22" stroke-width="2" stroke-dasharray="6 3" opacity="0.85">
      <animate attributeName="stroke-dashoffset" values="0;-9" dur="1.4s" begin="-0.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="28" fill="#ffaa22" fill-opacity="0.18"/>
    <text text-anchor="middle" y="3" font-size="8" fill="#ffd070" font-weight="700">KIDDIE</text>
    <text x="-44" y="-2" font-size="11" fill="#d4b878" letter-spacing="1" text-anchor="end">Script Kiddie</text>
    <text x="-44" y="14" font-size="9" fill="#5a6280" text-anchor="end">ADR-0008 · ⏳ Proposed</text>
  </g>
  <!-- i=8 (upper-left): Green Hat — Proposed -->
  <g transform="translate(464 276)" font-family="ui-monospace, monospace">
    <circle r="32" fill="none" stroke="#33cc55" stroke-width="2" stroke-dasharray="6 3" opacity="0.85">
      <animate attributeName="stroke-dashoffset" values="0;-9" dur="1.4s" begin="-1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="28" fill="#33cc55" fill-opacity="0.18"/>
    <text text-anchor="middle" y="3" font-size="10" fill="#9bd8a8" font-weight="700">GREEN</text>
    <text x="-44" y="-2" font-size="11" fill="#a0c8b0" letter-spacing="1" text-anchor="end">Green Hat</text>
    <text x="-44" y="14" font-size="9" fill="#5a6280" text-anchor="end">ADR-0006 · ⏳ Proposed</text>
  </g>
  <!-- i=9 (upper-left top): Red Hat — Proposed -->
  <g transform="translate(608 172)" font-family="ui-monospace, monospace">
    <circle r="32" fill="none" stroke="#ff3344" stroke-width="2" stroke-dasharray="6 3" opacity="0.85">
      <animate attributeName="stroke-dashoffset" values="0;-9" dur="1.4s" begin="-0.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="28" fill="#ff3344" fill-opacity="0.18"/>
    <text text-anchor="middle" y="3" font-size="10" fill="#ffa0a8" font-weight="700">RED</text>
    <text text-anchor="middle" y="-46" font-size="11" fill="#d8a0a8" letter-spacing="1">Red Hat</text>
    <text text-anchor="middle" y="-32" font-size="9" fill="#5a6280">ADR-0004 · ⏳ Proposed</text>
  </g>
  <!-- i=10 (upper-right top): Gray Hat — Proposed -->
  <g transform="translate(876 180)" font-family="ui-monospace, monospace">
    <circle r="32" fill="none" stroke="#888a96" stroke-width="2" stroke-dasharray="6 3" opacity="0.85">
      <animate attributeName="stroke-dashoffset" values="0;-9" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
    </circle>
    <circle r="28" fill="#888a96" fill-opacity="0.18"/>
    <text text-anchor="middle" y="3" font-size="10" fill="#c0c0cc" font-weight="700">GRAY</text>
    <text text-anchor="middle" y="-46" font-size="11" fill="#a0a0b0" letter-spacing="1">Gray Hat</text>
    <text text-anchor="middle" y="-32" font-size="9" fill="#5a6280">ADR-0003 · ⏳ Proposed</text>
  </g>

  <!-- LEGEND -->
  <g font-family="ui-monospace, monospace" font-size="11" transform="translate(80 760)">
    <!-- Accepted -->
    <circle cx="14" cy="0" r="10" fill="#39ff14" fill-opacity="0.85" stroke="#39ff14" stroke-width="1.5"/>
    <text x="34" y="4" fill="#7fff8f">✓ Accepted — runtime enforces the contract today</text>
    <!-- Proposed -->
    <circle cx="14" cy="22" r="10" fill="none" stroke="#5a6280" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="34" y="26" fill="#a0a0b8">⏳ Proposed — needs unbuilt runtime behavior (gating, lab-mode, defensive tools)</text>
  </g>

  <!-- footer -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#5a6280" opacity="0.7">
    <text x="1320" y="780" text-anchor="end" letter-spacing="2">every Hat: intent · ethics · behavior.</text>
  </g>
</svg>
